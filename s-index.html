<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <base href="/scards/">
    <link rel="manifest" href="./s-manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <title>Карточки v2.3.12</title>
    <script>
        (function() {
            var isPWA = window.matchMedia('(display-mode: standalone)').matches ||
                        window.navigator.standalone === true;
            
            var param = isPWA ? 'v=2.3.12' : 't=' + Date.now();
            
            function loadAsset(href, type) {
                return new Promise(function(resolve, reject) {
                    var el = document.createElement(type === 'css' ? 'link' : 'script');
                    if (type === 'css') {
                        el.rel = 'stylesheet';
                        el.href = href + (href.includes('?') ? '&' : '?') + param;
                        el.onload = resolve;
                        el.onerror = reject;
                    } else {
                        el.src = href + (href.includes('?') ? '&' : '?') + param;
                        el.onload = resolve;
                        el.onerror = reject;
                    }
                    document.head.appendChild(el);
                });
            }
            
            Promise.all([
                loadAsset('./s-styles.css', 'css'),
                loadAsset('./g-styles.css', 'css')
            ]).then(function() {
                return loadAsset('./g-config.js', 'js');
            }).then(function() {
                return loadAsset('./g-game.js', 'js');
            }).then(function() {
                return loadAsset('./s-app.js', 'js');
            }).then(function() {
                console.log('All assets loaded in order');
            }).catch(function(err) {
                console.error('Asset load failed:', err);            });
        })();
    </script>
</head>
<body>
    <section id="shell-screen" class="screen screen--active">
        <h1 class="heading">Карточки</h1>
        
        <div class="versions">
            <div class="version-item">
                <span class="version-label">Оболочка:</span>
                <span id="shell-version" class="version-value">-</span>
            </div>
            <div class="version-item">
                <span class="version-label">Игра:</span>
                <span id="game-version" class="version-value">-</span>
            </div>
        </div>
        
        <div class="menu-actions">
            <button class="btn btn--play" data-action="play">Играть</button>
            <button class="btn btn--update" data-action="update">Обновить</button>
            <button class="btn btn--exit" data-action="exit">Выход</button>
        </div>
    </section>

    <section id="game-screen" class="screen">
        <div class="game-header">
            <button class="btn btn--restart" data-action="restart">С начала</button>
            <button class="btn btn--exit" data-action="exit">Выход</button>
        </div>
        <div id="game-container"></div>
    </section>

    <div id="update-modal" class="modal">
        <h2 class="modal__title">Доступно обновление</h2>
        <div class="update-progress" id="update-progress">
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 0%"></div>
            </div>
            <span id="update-progress-text">0%</span>
        </div>
        <div class="modal-actions" id="update-actions">
            <button class="btn" data-action="confirm-update">Обновить</button>
            <button class="btn btn--exit" data-action="decline-update">Позже</button>
        </div>
    </div>

    <div id="close-screen" class="close-screen">
        <h1>Приложение можно закрыть</h1>        <p>Используйте кнопку "Назад" на устройстве</p>
    </div>

    <div id="debug-panel" class="debug-panel">
        <div class="debug-panel-content"></div>
    </div>
</body>
</html>
